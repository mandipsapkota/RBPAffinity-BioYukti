<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelixGuard — RNA Analysis Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
       
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .heading { font-family: 'Space Grotesk', sans-serif; }
        
        /* Custom Scrollbar for Affinity Map and Textarea */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px border-slate-700;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <header class="border-b border-slate-800 bg-slate-950/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-2xl shadow-lg">🧬</div>
                <div>
                    <span class="heading text-2xl font-bold tracking-tight text-blue-400">HelixGuard</span>
                    <span class="text-[10px] block -mt-1 text-slate-500 uppercase tracking-widest font-bold">Research Portal</span>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
                <a href="./index.html" class="hover:text-blue-400 transition-colors">Home</a>
                <a href="./dashboard.html" class="hover:text-blue-400 transition-colors">Dashboard</a>
                <a href="./background.html" class="hover:text-blue-400 transition-colors">Background</a>
                <a href="#" class="hover:text-blue-400 transition-colors">Clinical Impact</a>
                <div class="h-4 w-[1px] bg-slate-800"></div>
                <div class="flex items-center gap-2 text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-full border border-emerald-500/20">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-xs">ALS Research Active</span>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12">
    </main>
</body>
</html>
